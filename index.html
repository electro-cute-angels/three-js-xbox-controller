<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js Xbox Controller Demo</title>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="ui">
      <h1>Xbox Controller 3D Scene</h1>
      <div id="status">Waiting for controller...</div>
      <div id="controller-info">
        <div id="left-stick">Left Stick: (0, 0)</div>
        <div id="right-stick">Right Stick: (0, 0)</div>
        <div id="buttons">Buttons: None</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
