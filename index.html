<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js Xbox Controller Demo</title>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="ui">
      <h1>Cosmological Diagram</h1>
      <div id="status">Waiting for controller…</div>
      <div id="controller-info">
        <div id="left-stick">L Stick: (0, 0)</div>
        <div id="right-stick">R Stick: (0, 0)</div>
        <div id="zoom-level">Zoom: 1.00x</div>
        <div id="buttons">Buttons: None</div>
      </div>
      <div id="controls-legend">
        <strong>Controls</strong>
        <div>L Stick — Pan</div>
        <div>R Stick ↕ — Zoom</div>
        <div>LT / RT — Rotate</div>
        <div>LB / RB — Cycle bands</div>
        <div>A — Reset view</div>
        <div>Y — Toggle wireframe</div>
      </div>
      <div id="nav">
        <a href="/ski.html">⛷ Ski Slopes →</a>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
